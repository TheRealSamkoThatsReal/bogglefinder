<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1a2e"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <g transform="translate(96,96)">
    <!-- 4x4 board -->
    <g fill="#1b2740" stroke="#26344f" stroke-width="3">
      <rect x="0"   y="0"   width="70" height="70" rx="12"/>
      <rect x="83"  y="0"   width="70" height="70" rx="12"/>
      <rect x="166" y="0"   width="70" height="70" rx="12"/>
      <rect x="249" y="0"   width="70" height="70" rx="12"/>
      <rect x="0"   y="83"  width="70" height="70" rx="12"/>
      <rect x="83"  y="83"  width="70" height="70" rx="12"/>
      <rect x="166" y="83"  width="70" height="70" rx="12"/>
      <rect x="249" y="83"  width="70" height="70" rx="12"/>
      <rect x="0"   y="166" width="70" height="70" rx="12"/>
      <rect x="83"  y="166" width="70" height="70" rx="12"/>
      <rect x="166" y="166" width="70" height="70" rx="12"/>
      <rect x="249" y="166" width="70" height="70" rx="12"/>
      <rect x="0"   y="249" width="70" height="70" rx="12"/>
      <rect x="83"  y="249" width="70" height="70" rx="12"/>
      <rect x="166" y="249" width="70" height="70" rx="12"/>
      <rect x="249" y="249" width="70" height="70" rx="12"/>
    </g>
    <!-- highlight tiles spelling a path -->
    <rect x="0"   y="0"   width="70" height="70" rx="12" fill="url(#tile)"/>
    <rect x="83"  y="83"  width="70" height="70" rx="12" fill="url(#tile)"/>
    <rect x="166" y="166" width="70" height="70" rx="12" fill="url(#tile)"/>
    <rect x="249" y="83"  width="70" height="70" rx="12" fill="url(#tile)"/>
    <!-- path line -->
    <polyline points="35,35 118,118 201,201 284,118" fill="none" stroke="#f0abfc" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#062a26" font-family="system-ui, sans-serif" font-weight="700" font-size="40" text-anchor="middle">
      <text x="35"  y="50">B</text>
      <text x="118" y="133">O</text>
      <text x="201" y="216">G</text>
      <text x="284" y="133">E</text>
    </g>
  </g>
</svg>
